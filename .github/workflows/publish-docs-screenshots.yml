name: Publish docs screenshots

on:
  workflow_call:
    inputs:
      source_run_id:
        description: "GitHub Actions run ID that owns the docs screenshot artifact."
        required: true
        type: string
    secrets:
      HUSHLINE_WEBSITE_SCREENSHOTS_PAT:
        required: false
      SCREENSHOTS_PUSH_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "GitHub Actions run ID that owns the docs screenshot artifact."
        required: true
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify trusted source run
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.source_run_id }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}")"
          JOBS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs")"
          RUN_JSON="$RUN_JSON" JOBS_JSON="$JOBS_JSON" CURRENT_RUN_ID="$CURRENT_RUN_ID" python3 - <<'PY'
          import json
          import os
          import sys

          run = json.loads(os.environ["RUN_JSON"])
          jobs = json.loads(os.environ["JOBS_JSON"])
          current_run_id = os.environ["CURRENT_RUN_ID"]
          errors = []

          if str(run.get("id")) != os.environ["RUN_ID"]:
              errors.append("source run ID mismatch")
          if run.get("event") != "release":
              errors.append(f"source run event must be release, got {run.get('event')!r}")
          if run.get("path") != ".github/workflows/docs-screenshots.yml":
              errors.append(f"source run workflow path is unexpected: {run.get('path')!r}")
          head_repository = run.get("head_repository") or {}
          if head_repository.get("full_name") != os.environ["GITHUB_REPOSITORY"]:
              errors.append(
                  "source run repository must match "
                  f"{os.environ['GITHUB_REPOSITORY']}, got {head_repository.get('full_name')!r}"
              )
          is_current_run = str(run.get("id")) == current_run_id
          capture_succeeded = any(
              job.get("name") == "capture" and job.get("conclusion") == "success"
              for job in jobs.get("jobs", [])
          )
          if not is_current_run and run.get("conclusion") != "success" and not capture_succeeded:
              errors.append(
                  "completed source runs must have a successful conclusion or a successful "
                  "capture job"
              )

          if errors:
              for error in errors:
                  print(f"::error::{error}")
              sys.exit(1)

          print(
              "Trusted docs screenshot source run verified: "
              f"id={run.get('id')} event={run.get('event')} path={run.get('path')}"
          )
          PY

      - name: Download screenshot artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          ARTIFACT_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts")"
          ARTIFACT_ID="$(
            ARTIFACT_JSON="$ARTIFACT_JSON" python -c 'import json, os; payload = json.loads(os.environ["ARTIFACT_JSON"]); matches = [str(artifact["id"]) for artifact in payload.get("artifacts", []) if not artifact.get("expired") and (artifact.get("name") or "").startswith("docs-screenshots-")]; print(matches[0] if matches else "")'
          )"
          if [ -z "$ARTIFACT_ID" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No docs screenshot artifact found for run ${RUN_ID}."
            exit 0
          fi

          mkdir -p /tmp/docs-screenshots-artifact
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/docs-screenshots-artifact/artifact.zip
          unzip -q /tmp/docs-screenshots-artifact/artifact.zip -d /tmp/docs-screenshots-artifact/unpacked
          rm -f /tmp/docs-screenshots-artifact/artifact.zip

          python3 - <<'PY'
          from pathlib import Path
          import json
          import re
          import sys

          artifact_root = Path("/tmp/docs-screenshots-artifact/unpacked")
          image_extensions = {".avif", ".gif", ".jpeg", ".jpg", ".png", ".webp"}
          allowed_exact = {
              Path("release_key.txt"),
              Path("capture_files.json"),
              Path("screenshots/README.md"),
              Path("screenshots/release/README.md"),
              Path("screenshots/release/manifest.json"),
          }

          def fail(message: str) -> None:
              print(f"::error::{message}")
              sys.exit(1)

          release_key_path = artifact_root / "release_key.txt"
          refs_path = artifact_root / "capture_files.json"
          release_root = artifact_root / "screenshots" / "release"
          if not release_key_path.is_file():
              fail("docs screenshot artifact is missing release_key.txt")
          if not refs_path.is_file():
              fail("docs screenshot artifact is missing capture_files.json")
          if not release_root.is_dir():
              fail("docs screenshot artifact is missing screenshots/release")

          release_key = release_key_path.read_text(encoding="utf-8").strip()
          if not re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_key):
              fail(f"Unexpected docs screenshot release key: {release_key!r}")
          refs = json.loads(refs_path.read_text(encoding="utf-8"))
          if not isinstance(refs, list) or not all(isinstance(ref, str) for ref in refs):
              fail("capture_files.json must contain a JSON array of screenshot paths")

          for path in artifact_root.rglob("*"):
              relative = path.relative_to(artifact_root)
              if path.is_symlink():
                  fail(f"docs screenshot artifact must not contain symlinks: {relative}")
              if path.is_dir():
                  continue
              if relative in allowed_exact:
                  continue
              is_current_image = relative.parts[:2] == ("screenshots", "current")
              is_release_image = relative.parts[:2] == ("screenshots", "release")
              is_legacy_release_image = relative.parts[:3] == (
                  "screenshots",
                  "releases",
                  release_key,
              )
              if relative == Path("screenshots", "releases", release_key, "README.md"):
                  continue
              if (is_current_image or is_release_image or is_legacy_release_image) and (
                  path.suffix.lower() in image_extensions
              ):
                  continue
              fail(f"Unexpected docs screenshot artifact file: {relative}")
          PY

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=/tmp/docs-screenshots-artifact/unpacked" >> "$GITHUB_OUTPUT"

      - name: Publish screenshots to hushline-screenshots
        if: steps.artifact.outputs.found == 'true'
        env:
          SCREENSHOTS_REPOSITORY: scidsg/hushline-screenshots
          SCREENSHOTS_DEFAULT_BRANCH: main
          SCREENSHOTS_PUSH_TOKEN: ${{ secrets.SCREENSHOTS_PUSH_TOKEN }}
          ARTIFACT_DIR: ${{ steps.artifact.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          trap 'rm -rf /tmp/hushline-screenshots' EXIT
          if [ -z "${SCREENSHOTS_PUSH_TOKEN:-}" ]; then
            echo "Skipping publish: SCREENSHOTS_PUSH_TOKEN secret is missing."
            exit 0
          fi

          RELEASE_KEY="$(tr -d '\r\n' < "${ARTIFACT_DIR}/release_key.txt")"
          RELEASE_KEY="$RELEASE_KEY" python -c 'import os, re, sys; release_key = os.environ["RELEASE_KEY"].strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_key) or sys.exit(f"Unexpected docs screenshot release key: {release_key!r}")'

          SCREENSHOT_ROOT="${ARTIFACT_DIR}/screenshots/release"
          if [ ! -d "$SCREENSHOT_ROOT" ]; then
            LEGACY_RELEASE_ROOT="${ARTIFACT_DIR}/screenshots/releases/${RELEASE_KEY}"
            if [ -d "$LEGACY_RELEASE_ROOT" ]; then
              SCREENSHOT_ROOT="$LEGACY_RELEASE_ROOT"
            fi
          fi
          ROOT_README="${ARTIFACT_DIR}/screenshots/README.md"
          if [ ! -d "$SCREENSHOT_ROOT" ]; then
            echo "Expected screenshot source directory not found: ${ARTIFACT_DIR}/screenshots/release"
            exit 1
          fi
          if [ ! -f "$ROOT_README" ]; then
            echo "Expected screenshot README not found: $ROOT_README"
            exit 1
          fi

          export HUSHLINE_GIT_PUSH_TOKEN="$SCREENSHOTS_PUSH_TOKEN"
          GIT_ASKPASS="${RUNNER_TEMP}/hushline-screenshots-git-askpass.sh"
          cat > "$GIT_ASKPASS" <<'EOF'
          #!/bin/sh
          case "$1" in
            Username*) printf '%s\n' 'x-access-token' ;;
            Password*) printf '%s\n' "${HUSHLINE_GIT_PUSH_TOKEN:?}" ;;
            *) printf '\n' ;;
          esac
          EOF
          chmod 700 "$GIT_ASKPASS"
          export GIT_ASKPASS GIT_TERMINAL_PROMPT=0

          git clone \
            --depth 1 \
            --filter=blob:none \
            --single-branch \
            --branch "${SCREENSHOTS_DEFAULT_BRANCH}" \
            "https://github.com/${SCREENSHOTS_REPOSITORY}.git" \
            /tmp/hushline-screenshots
          cd /tmp/hushline-screenshots
          git sparse-checkout init --no-cone
          git sparse-checkout set README.md badge-docs-screenshots.json releases/latest "releases/${RELEASE_KEY}"
          git checkout -B "${SCREENSHOTS_DEFAULT_BRANCH}" "origin/${SCREENSHOTS_DEFAULT_BRANCH}"

          mkdir -p "releases/${RELEASE_KEY}" "releases/latest"
          rsync -a --delete "${SCREENSHOT_ROOT}/" "releases/${RELEASE_KEY}/"
          rsync -a --delete "${SCREENSHOT_ROOT}/" "releases/latest/"
          cp "${ROOT_README}" "README.md"

          cat > badge-docs-screenshots.json <<EOF
          {"schemaVersion":1,"label":"docs screenshots","message":"${RELEASE_KEY}","color":"blue"}
          EOF

          git add README.md badge-docs-screenshots.json releases
          if git diff --cached --quiet; then
            echo "No screenshot archive changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update screenshot archive for ${RELEASE_KEY}"
          git push origin "HEAD:${SCREENSHOTS_DEFAULT_BRANCH}"
          echo "Published screenshot archive directly to ${SCREENSHOTS_REPOSITORY}@${SCREENSHOTS_DEFAULT_BRANCH}."

      - name: Publish current screenshots to hushline-website
        if: steps.artifact.outputs.found == 'true'
        env:
          WEBSITE_REPOSITORY: scidsg/hushline-website
          WEBSITE_DEFAULT_BRANCH: main
          WEBSITE_PUSH_TOKEN: ${{ secrets.HUSHLINE_WEBSITE_SCREENSHOTS_PAT || secrets.SCREENSHOTS_PUSH_TOKEN }}
          WEBSITE_SCREENSHOT_ROOT: src/assets/img/screenshots
          ARTIFACT_DIR: ${{ steps.artifact.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          if [ -z "${WEBSITE_PUSH_TOKEN:-}" ]; then
            echo "Skipping publish: HUSHLINE_WEBSITE_SCREENSHOTS_PAT or SCREENSHOTS_PUSH_TOKEN secret is missing."
            exit 0
          fi

          RELEASE_KEY="$(tr -d '\r\n' < "${ARTIFACT_DIR}/release_key.txt")"
          RELEASE_KEY="$RELEASE_KEY" python -c 'import os, re, sys; release_key = os.environ["RELEASE_KEY"].strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_key) or sys.exit(f"Unexpected docs screenshot release key: {release_key!r}")'

          CURRENT_ROOT="${ARTIFACT_DIR}/screenshots/release"
          if [ ! -d "$CURRENT_ROOT" ]; then
            LEGACY_CURRENT_ROOT="${ARTIFACT_DIR}/screenshots/current"
            if [ -d "$LEGACY_CURRENT_ROOT" ]; then
              CURRENT_ROOT="$LEGACY_CURRENT_ROOT"
            fi
          fi
          if [ ! -d "$CURRENT_ROOT" ]; then
            echo "Expected current screenshot directory not found: ${ARTIFACT_DIR}/screenshots/release"
            exit 1
          fi

          export HUSHLINE_GIT_PUSH_TOKEN="$WEBSITE_PUSH_TOKEN"
          GIT_ASKPASS="${RUNNER_TEMP}/hushline-website-git-askpass.sh"
          cat > "$GIT_ASKPASS" <<'EOF'
          #!/bin/sh
          case "$1" in
            Username*) printf '%s\n' 'x-access-token' ;;
            Password*) printf '%s\n' "${HUSHLINE_GIT_PUSH_TOKEN:?}" ;;
            *) printf '\n' ;;
          esac
          EOF
          chmod 700 "$GIT_ASKPASS"
          export GIT_ASKPASS GIT_TERMINAL_PROMPT=0

          git clone \
            --depth 1 \
            --filter=blob:none \
            --single-branch \
            --branch "${WEBSITE_DEFAULT_BRANCH}" \
            "https://github.com/${WEBSITE_REPOSITORY}.git" \
            /tmp/hushline-website
          cd /tmp/hushline-website
          git checkout -B "${WEBSITE_DEFAULT_BRANCH}" "origin/${WEBSITE_DEFAULT_BRANCH}"

          FILTERED_CURRENT_ROOT="$(mktemp -d)"
          python3 "${GITHUB_WORKSPACE}/scripts/resolve-doc-screenshot-allowlist.py" \
            --refs-input "${ARTIFACT_DIR}/capture_files.json" \
            --screenshot-root "$WEBSITE_SCREENSHOT_ROOT" \
            --current-root "$CURRENT_ROOT" \
            --filtered-root "$FILTERED_CURRENT_ROOT"

          mkdir -p "${WEBSITE_SCREENSHOT_ROOT}/current"
          rsync -a --delete "${FILTERED_CURRENT_ROOT}/" "${WEBSITE_SCREENSHOT_ROOT}/current/"

          git add "${WEBSITE_SCREENSHOT_ROOT}/current"
          if git diff --cached --quiet; then
            echo "No current website screenshot changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update current website screenshots for ${RELEASE_KEY}"
          git push origin "HEAD:${WEBSITE_DEFAULT_BRANCH}"
          echo "Published current website screenshots directly to ${WEBSITE_REPOSITORY}@${WEBSITE_DEFAULT_BRANCH}."
