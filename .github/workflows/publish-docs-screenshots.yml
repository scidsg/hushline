name: Publish docs screenshots

on:
  workflow_call:
    inputs:
      source_run_id:
        description: "GitHub Actions run ID that owns the docs screenshot artifact."
        required: true
        type: string
    secrets:
      HUSHLINE_WEBSITE_SCREENSHOTS_PAT:
        required: false
      HUSHLINE_SCREENSHOTS_PAT:
        required: false
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "GitHub Actions run ID that owns the docs screenshot artifact."
        required: true
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download screenshot artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          ARTIFACT_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts")"
          ARTIFACT_ID="$(
            ARTIFACT_JSON="$ARTIFACT_JSON" python -c 'import json, os; payload = json.loads(os.environ["ARTIFACT_JSON"]); matches = [str(artifact["id"]) for artifact in payload.get("artifacts", []) if not artifact.get("expired") and (artifact.get("name") or "").startswith("docs-screenshots-")]; print(matches[0] if matches else "")'
          )"
          if [ -z "$ARTIFACT_ID" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No docs screenshot artifact found for run ${RUN_ID}."
            exit 0
          fi

          mkdir -p /tmp/docs-screenshots-artifact
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o /tmp/docs-screenshots-artifact/artifact.zip
          unzip -q /tmp/docs-screenshots-artifact/artifact.zip -d /tmp/docs-screenshots-artifact/unpacked
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=/tmp/docs-screenshots-artifact/unpacked" >> "$GITHUB_OUTPUT"

      - name: Publish screenshots to hushline-website
        if: steps.artifact.outputs.found == 'true'
        env:
          WEBSITE_REPOSITORY: scidsg/hushline-website
          WEBSITE_DEFAULT_BRANCH: main
          WEBSITE_BRANCH: automation/docs-screenshots
          WEBSITE_PUSH_TOKEN: ${{ secrets.HUSHLINE_WEBSITE_SCREENSHOTS_PAT }}
          WEBSITE_SCREENSHOT_ROOT: src/assets/img/screenshots
          ARTIFACT_DIR: ${{ steps.artifact.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          if [ -z "${WEBSITE_PUSH_TOKEN:-}" ]; then
            echo "Skipping publish: HUSHLINE_WEBSITE_SCREENSHOTS_PAT secret is missing."
            exit 0
          fi

          RELEASE_KEY="$(tr -d '\r\n' < "${ARTIFACT_DIR}/release_key.txt")"
          RELEASE_KEY="$RELEASE_KEY" python -c 'import os, re, sys; release_key = os.environ["RELEASE_KEY"].strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_key) or sys.exit(f"Unexpected docs screenshot release key: {release_key!r}")'

          RELEASE_ROOT="${ARTIFACT_DIR}/screenshots/releases/${RELEASE_KEY}"
          LATEST_ROOT="${ARTIFACT_DIR}/screenshots/releases/latest"
          ROOT_README="${ARTIFACT_DIR}/screenshots/README.md"
          if [ ! -d "$RELEASE_ROOT" ]; then
            echo "Expected screenshot source directory not found: $RELEASE_ROOT"
            exit 1
          fi
          if [ ! -d "$LATEST_ROOT" ]; then
            echo "Expected latest screenshot directory not found: $LATEST_ROOT"
            exit 1
          fi
          if [ ! -f "$ROOT_README" ]; then
            echo "Expected screenshot README not found: $ROOT_README"
            exit 1
          fi

          export GH_TOKEN="${WEBSITE_PUSH_TOKEN}"

          git clone "https://x-access-token:${WEBSITE_PUSH_TOKEN}@github.com/${WEBSITE_REPOSITORY}.git" /tmp/hushline-website
          cd /tmp/hushline-website
          git checkout -B "${WEBSITE_BRANCH}" "origin/${WEBSITE_DEFAULT_BRANCH}"

          mkdir -p "${WEBSITE_SCREENSHOT_ROOT}/releases/${RELEASE_KEY}" "${WEBSITE_SCREENSHOT_ROOT}/releases/latest"
          rsync -a --delete --exclude 'releases/' "${LATEST_ROOT}/" "${WEBSITE_SCREENSHOT_ROOT}/"
          rsync -a --delete "${RELEASE_ROOT}/" "${WEBSITE_SCREENSHOT_ROOT}/releases/${RELEASE_KEY}/"
          rsync -a --delete "${LATEST_ROOT}/" "${WEBSITE_SCREENSHOT_ROOT}/releases/latest/"
          cp "${ROOT_README}" "${WEBSITE_SCREENSHOT_ROOT}/README.md"

          cat > badge-docs-screenshots.json <<EOF
          {"schemaVersion":1,"label":"docs screenshots","message":"${RELEASE_KEY}","color":"blue"}
          EOF

          git add "${WEBSITE_SCREENSHOT_ROOT}" badge-docs-screenshots.json
          if git diff --cached --quiet; then
            echo "No screenshot changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update website screenshots for ${RELEASE_KEY}"
          git push --force-with-lease origin "HEAD:${WEBSITE_BRANCH}"

          pr_title="Update website screenshots for ${RELEASE_KEY}"
          pr_body="$(cat <<EOF
          Automated docs screenshots sync from \`${GITHUB_REPOSITORY}\`.

          - Release: \`${RELEASE_KEY}\`
          - Source workflow run: \`${GITHUB_RUN_ID}\`
          EOF
          )"

          pr_url="$(gh pr list \
            --repo "${WEBSITE_REPOSITORY}" \
            --head "${WEBSITE_BRANCH}" \
            --base "${WEBSITE_DEFAULT_BRANCH}" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"

          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" \
              --repo "${WEBSITE_REPOSITORY}" \
              --title "$pr_title" \
              --body "$pr_body"
          else
            pr_url="$(gh pr create \
              --repo "${WEBSITE_REPOSITORY}" \
              --base "${WEBSITE_DEFAULT_BRANCH}" \
              --head "${WEBSITE_BRANCH}" \
              --title "$pr_title" \
              --body "$pr_body")"
          fi

          if gh pr merge "$pr_url" \
            --repo "${WEBSITE_REPOSITORY}" \
            --squash \
            --delete-branch
          then
            echo "Merged $pr_url"
          else
            echo "Created or updated $pr_url but it is not immediately mergeable."
          fi

      - name: Publish screenshots to hushline-screenshots
        if: steps.artifact.outputs.found == 'true'
        env:
          SCREENSHOTS_REPOSITORY: scidsg/hushline-screenshots
          SCREENSHOTS_DEFAULT_BRANCH: main
          SCREENSHOTS_BRANCH: automation/docs-screenshots
          SCREENSHOTS_PUSH_TOKEN: ${{ secrets.HUSHLINE_SCREENSHOTS_PAT != '' && secrets.HUSHLINE_SCREENSHOTS_PAT || secrets.HUSHLINE_WEBSITE_SCREENSHOTS_PAT }}
          ARTIFACT_DIR: ${{ steps.artifact.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          if [ -z "${SCREENSHOTS_PUSH_TOKEN:-}" ]; then
            echo "Skipping publish: no screenshots repo token is configured."
            exit 0
          fi

          RELEASE_KEY="$(tr -d '\r\n' < "${ARTIFACT_DIR}/release_key.txt")"
          RELEASE_KEY="$RELEASE_KEY" python -c 'import os, re, sys; release_key = os.environ["RELEASE_KEY"].strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_key) or sys.exit(f"Unexpected docs screenshot release key: {release_key!r}")'

          RELEASE_ROOT="${ARTIFACT_DIR}/screenshots/releases/${RELEASE_KEY}"
          LATEST_ROOT="${ARTIFACT_DIR}/screenshots/releases/latest"
          ROOT_README="${ARTIFACT_DIR}/screenshots/README.md"
          if [ ! -d "$RELEASE_ROOT" ]; then
            echo "Expected screenshot source directory not found: $RELEASE_ROOT"
            exit 1
          fi
          if [ ! -d "$LATEST_ROOT" ]; then
            echo "Expected latest screenshot directory not found: $LATEST_ROOT"
            exit 1
          fi
          if [ ! -f "$ROOT_README" ]; then
            echo "Expected screenshot README not found: $ROOT_README"
            exit 1
          fi

          export GH_TOKEN="${SCREENSHOTS_PUSH_TOKEN}"

          git clone "https://x-access-token:${SCREENSHOTS_PUSH_TOKEN}@github.com/${SCREENSHOTS_REPOSITORY}.git" /tmp/hushline-screenshots
          cd /tmp/hushline-screenshots
          git checkout -B "${SCREENSHOTS_BRANCH}" "origin/${SCREENSHOTS_DEFAULT_BRANCH}"

          mkdir -p "releases/${RELEASE_KEY}" "releases/latest"
          rsync -a --delete "${RELEASE_ROOT}/" "releases/${RELEASE_KEY}/"
          rsync -a --delete "${LATEST_ROOT}/" "releases/latest/"
          cp "${ROOT_README}" "README.md"

          cat > badge-docs-screenshots.json <<EOF
          {"schemaVersion":1,"label":"docs screenshots","message":"${RELEASE_KEY}","color":"blue"}
          EOF

          git add README.md badge-docs-screenshots.json releases
          if git diff --cached --quiet; then
            echo "No screenshot archive changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update screenshot archive for ${RELEASE_KEY}"
          git push --force-with-lease origin "HEAD:${SCREENSHOTS_BRANCH}"

          pr_title="Update screenshot archive for ${RELEASE_KEY}"
          pr_body="$(cat <<EOF
          Automated docs screenshots sync from \`${GITHUB_REPOSITORY}\`.

          - Release: \`${RELEASE_KEY}\`
          - Source workflow run: \`${GITHUB_RUN_ID}\`
          EOF
          )"

          pr_url="$(gh pr list \
            --repo "${SCREENSHOTS_REPOSITORY}" \
            --head "${SCREENSHOTS_BRANCH}" \
            --base "${SCREENSHOTS_DEFAULT_BRANCH}" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"

          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" \
              --repo "${SCREENSHOTS_REPOSITORY}" \
              --title "$pr_title" \
              --body "$pr_body"
          else
            pr_url="$(gh pr create \
              --repo "${SCREENSHOTS_REPOSITORY}" \
              --base "${SCREENSHOTS_DEFAULT_BRANCH}" \
              --head "${SCREENSHOTS_BRANCH}" \
              --title "$pr_title" \
              --body "$pr_body")"
          fi

          if gh pr merge "$pr_url" \
            --repo "${SCREENSHOTS_REPOSITORY}" \
            --squash \
            --delete-branch
          then
            echo "Merged $pr_url"
          else
            echo "Created or updated $pr_url but it is not immediately mergeable."
          fi
