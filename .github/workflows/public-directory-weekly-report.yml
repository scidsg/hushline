name: Weekly Public Directory Report

on:
  workflow_dispatch:
    inputs:
      directory_url:
        description: "Public directory JSON URL to diff."
        required: false
        default: "https://tips.hushline.app/directory/users.json"
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: read

concurrency:
  group: public-directory-weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DIRECTORY_URL: ${{ inputs.directory_url != '' && inputs.directory_url || 'https://tips.hushline.app/directory/users.json' }}
      STATS_REPOSITORY: scidsg/hushline-stats
      STATS_DEFAULT_BRANCH: main
      STATS_BRANCH: automation/public-directory-report
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Fetch current public directory feed
        run: |
          set -euo pipefail
          curl -fsSL "$DIRECTORY_URL" --output /tmp/public-directory-current.json

      - name: Check out hushline-stats
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.STATS_REPOSITORY }}
          token: ${{ secrets.HUSHLINE_WEEKLY_REPORT }}
          path: hushline-stats

      - name: Build weekly directory report
        run: |
          set -euo pipefail
          mkdir -p /tmp/public-directory-report
          REPORT_DATE="$(date -u +%F)"
          REPORT_TIMESTAMP="$(date -u +%Y-%m-%dT%H-%M-%SZ)"

          ARGS=(
            --current /tmp/public-directory-current.json
            --snapshot-output /tmp/public-directory-report/latest.json
            --report-output /tmp/public-directory-report/base-report.md
            --json-output /tmp/public-directory-report/summary.json
            --snapshot-history-dir hushline-stats/public-directory/snapshots
            --summary-history-dir hushline-stats/public-directory/summaries
            --readme-output /tmp/public-directory-report/README.md
            --report-timestamp "${REPORT_TIMESTAMP}"
            --source-url "${DIRECTORY_URL}"
          )
          python3 scripts/public_directory_snapshot_report.py "${ARGS[@]}"

          {
            echo "## Public Directory Snapshot Report"
            echo
            echo "- Report date (UTC): ${REPORT_DATE}"
            echo "- Snapshot timestamp (UTC): ${REPORT_TIMESTAMP}"
            echo "- Source URL: ${DIRECTORY_URL}"
            tail -n +3 /tmp/public-directory-report/base-report.md
          } > /tmp/public-directory-report/report.md

          mkdir -p \
            hushline-stats/public-directory/reports \
            hushline-stats/public-directory/snapshots \
            hushline-stats/public-directory/summaries
          cp /tmp/public-directory-report/README.md hushline-stats/README.md
          cp /tmp/public-directory-report/latest.json hushline-stats/public-directory/latest.json
          cp /tmp/public-directory-report/summary.json hushline-stats/public-directory/latest-summary.json
          cp /tmp/public-directory-report/report.md hushline-stats/public-directory/latest.md
          cp /tmp/public-directory-report/latest.json "hushline-stats/public-directory/snapshots/${REPORT_TIMESTAMP}.json"
          cp /tmp/public-directory-report/summary.json "hushline-stats/public-directory/summaries/${REPORT_TIMESTAMP}.json"
          cp /tmp/public-directory-report/report.md "hushline-stats/public-directory/reports/${REPORT_TIMESTAMP}.md"

      - name: Publish workflow summary
        run: |
          set -euo pipefail
          cat /tmp/public-directory-report/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and open stats PR
        run: |
          set -euo pipefail
          REPORT_TIMESTAMP="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          export GH_TOKEN="${{ secrets.HUSHLINE_WEEKLY_REPORT }}"
          cd hushline-stats
          git checkout -B "${STATS_BRANCH}" "origin/${STATS_DEFAULT_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md public-directory
          if git diff --cached --quiet; then
            echo "No public directory changes to publish."
            exit 0
          fi
          git commit -m "Update public directory snapshot report for ${REPORT_TIMESTAMP}"
          git push --force-with-lease origin "HEAD:${STATS_BRANCH}"

          pr_title="Update public directory snapshot report for ${REPORT_TIMESTAMP}"
          stats_owner="${STATS_REPOSITORY%%/*}"
          pr_body="$(cat <<EOF
          Automated public directory snapshot sync from \`${GITHUB_REPOSITORY}\`.

          - Snapshot timestamp (UTC): \`${REPORT_TIMESTAMP}\`
          - Source workflow run: \`${GITHUB_RUN_ID}\`
          - Source URL: \`${DIRECTORY_URL}\`
          EOF
          )"

          pr_url="$(gh pr list \
            --repo "${STATS_REPOSITORY}" \
            --head "${stats_owner}:${STATS_BRANCH}" \
            --base "${STATS_DEFAULT_BRANCH}" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"

          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" \
              --repo "${STATS_REPOSITORY}" \
              --title "$pr_title" \
              --body "$pr_body"
          else
            pr_url="$(gh pr create \
              --repo "${STATS_REPOSITORY}" \
              --base "${STATS_DEFAULT_BRANCH}" \
              --head "${stats_owner}:${STATS_BRANCH}" \
              --title "$pr_title" \
              --body "$pr_body")"
          fi

          if gh pr merge "$pr_url" \
            --repo "${STATS_REPOSITORY}" \
            --squash \
            --delete-branch
          then
            echo "Merged $pr_url"
          else
            echo "Created or updated $pr_url but it is not immediately mergeable."
          fi
