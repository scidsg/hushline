---
name: E2EE and Privacy Regressions

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2ee-privacy-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Pull compose dependency images
        run: |
          for attempt in 1 2 3 4 5; do
            if docker compose pull postgres blob-storage; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Run E2EE and privacy regression tests
        run: |
          make test \
            TESTS="tests/test_behavior_contracts.py tests/test_resend_message.py tests/test_crypto.py tests/test_secure_session.py" \
            PYTEST_ADDOPTS="--skip-local-only"
