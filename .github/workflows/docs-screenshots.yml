name: Docs Screenshots

on:
  workflow_run:
    workflows: ["Build release container image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_key:
        description: "Release key (optional, e.g. v0.5.53). Leave blank to auto-use version."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  capture:
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          startsWith(github.event.workflow_run.head_branch || '', 'v')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Check screenshot manifest
        id: manifest
        run: |
          if [ -f "docs/screenshots/scenes.json" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping docs screenshots: docs/screenshots/scenes.json not found."
          fi

      - uses: actions/setup-node@v4
        if: steps.manifest.outputs.enabled == 'true'
        with:
          node-version: 20

      - name: Install Node dependencies
        if: steps.manifest.outputs.enabled == 'true'
        run: npm ci

      - name: Install Playwright package
        if: steps.manifest.outputs.enabled == 'true'
        run: npm install --no-save playwright@1.54.2

      - name: Install Playwright browser
        if: steps.manifest.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build assets
        if: steps.manifest.outputs.enabled == 'true'
        run: npm run build:prod

      - name: Start local app
        if: steps.manifest.outputs.enabled == 'true'
        run: |
          docker compose up -d postgres blob-storage
          docker compose run --rm dev_data
          docker compose up -d app
          attempt=0
          until curl -fsS http://localhost:8080/ > /dev/null; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 30 ]; then
              break
            fi
            sleep 2
          done

      - name: Resolve release key
        id: vars
        if: steps.manifest.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          RELEASE_KEY="${{ github.event.inputs.release_key }}"
          if [ -z "$RELEASE_KEY" ] && [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            RELEASE_KEY="$(
              python -c 'import json, os, re, sys; event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8")); branch = ((event.get("workflow_run") or {}).get("head_branch") or "").strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", branch) or sys.exit(f"Unexpected workflow_run head_branch for docs screenshots: {branch!r}"); print(branch)'
            )"
          fi
          if [ -z "$RELEASE_KEY" ]; then
            VERSION=$(cut -d'"' -f2 hushline/version.py)
            RELEASE_KEY="v$VERSION"
          fi
          RELEASE_KEY="$RELEASE_KEY" python -c 'import os, re, sys; release_key = os.environ["RELEASE_KEY"].strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_key) or sys.exit(f"Unexpected docs screenshot release key: {release_key!r}")'
          echo "release_key=$RELEASE_KEY" >> "$GITHUB_OUTPUT"

      - name: Capture screenshots
        if: steps.manifest.outputs.enabled == 'true'
        env:
          SCREENSHOT_ADMIN_PASSWORD: Test-testtesttesttest-1
          SCREENSHOT_ARTVANDELAY_PASSWORD: Test-testtesttesttest-1
          SCREENSHOT_NEWMAN_PASSWORD: Test-testtesttesttest-1
        run: |
          node scripts/capture-doc-screenshots.mjs \
            --base-url "http://localhost:8080" \
            --release "${{ steps.vars.outputs.release_key }}" \
            --manifest docs/screenshots/scenes.json

      - name: Prepare publish artifact
        id: artifact
        if: steps.manifest.outputs.enabled == 'true'
        env:
          RELEASE_KEY: ${{ steps.vars.outputs.release_key }}
        run: |
          set -euo pipefail
          SRC_ROOT="docs/screenshots/releases/${RELEASE_KEY}"
          if [ ! -d "$SRC_ROOT" ]; then
            echo "Expected screenshot source directory not found: $SRC_ROOT"
            exit 1
          fi

          ARTIFACT_ROOT="$(mktemp -d)"
          mkdir -p "${ARTIFACT_ROOT}/screenshots"
          cp -R "$SRC_ROOT" "${ARTIFACT_ROOT}/screenshots/${RELEASE_KEY}"
          printf '%s\n' "$RELEASE_KEY" > "${ARTIFACT_ROOT}/release_key.txt"
          echo "artifact_root=$ARTIFACT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Upload screenshot artifacts
        if: steps.manifest.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docs-screenshots-${{ steps.vars.outputs.release_key }}
          path: ${{ steps.artifact.outputs.artifact_root }}
