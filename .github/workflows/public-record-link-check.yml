name: Public Record Link Check

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1"

jobs:
  public-record-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate live public record links
        run: make test-public-record-links
