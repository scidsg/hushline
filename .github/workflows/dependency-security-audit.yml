---
name: Dependency Security Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "poetry.lock"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/dependency-security-audit.yml"
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "poetry.lock"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/dependency-security-audit.yml"

permissions:
  contents: read

jobs:
  detect-python-lockfile-change:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      poetry_lock_changed: ${{ steps.diff.outputs.poetry_lock_changed }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            printf 'poetry_lock_changed=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -Fxq 'poetry.lock'; then
            printf 'poetry_lock_changed=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'poetry_lock_changed=false\n' >> "$GITHUB_OUTPUT"
          fi

  python-audit:
    needs: detect-python-lockfile-change
    if: needs.detect-python-lockfile-change.outputs.poetry_lock_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Python dependency audit
        run: |
          docker compose run --rm app bash -lc \
            'poetry self add poetry-plugin-export && poetry export -f requirements.txt --without-hashes -o /tmp/requirements.txt && python -m pip install --disable-pip-version-check pip-audit==2.10.0 && pip-audit -r /tmp/requirements.txt'

  node-runtime-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Node runtime dependency audit
        run: npm audit --omit=dev --package-lock-only

  node-full-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Full Node dependency audit
        run: npm audit --package-lock-only
