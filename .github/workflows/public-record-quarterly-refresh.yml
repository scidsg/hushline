name: Quarterly Public Record Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 1 1,4,7,10 *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: public-record-quarterly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REFRESH_REPORT_DIR: .github/tmp/public-record-refresh
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Refresh public-record listings
        run: |
          mkdir -p "$REFRESH_REPORT_DIR"
          make refresh-public-record-corrections \
            REFRESH_PUBLIC_RECORD_CORRECTION_SUMMARY_OUTPUT="$REFRESH_REPORT_DIR/pr-refresh.md" \
            REFRESH_PUBLIC_RECORD_CORRECTION_REPORT_JSON_OUTPUT="$REFRESH_REPORT_DIR/pr-refresh.json"

      - name: Upload refresh report artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: public-record-refresh-report-${{ github.run_id }}
          path: |
            .github/tmp/public-record-refresh/pr-refresh.md
            .github/tmp/public-record-refresh/pr-refresh.json
          if-no-files-found: error

      - name: Read refresh report
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          delimiter="PUBLIC_RECORD_SUMMARY_$(date +%s)"

          if [ -f "$REFRESH_REPORT_DIR/pr-refresh.md" ]; then
            {
              echo "body<<${delimiter}"
              cat "$REFRESH_REPORT_DIR/pr-refresh.md"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "body<<${delimiter}"
            echo "## Public Record Refresh Report"
            echo
            echo "- Refresh completed."
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update refresh PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.ADMIN_PAT }}
          branch: bot/public-record-quarterly-refresh
          delete-branch: true
          commit-message: "Refresh public-record law firm listings"
          title: "Refresh public-record law firm listings"
          body: |
            Automated quarterly refresh of `hushline/data/public_record_law_firms.json`.

            ${{ steps.summary.outputs.body }}
          add-paths: |
            hushline/data/public_record_law_firms.json
            docs/PUBLIC-RECORD-PROVENANCE-ROADMAP.md
