name: Bump staging infra after release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: bump-staging-after-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  bump-staging:
    if: ${{ !github.event.release.prerelease && startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      IMAGE_REF: ghcr.io/${{ github.repository }}/hushline:${{ github.event.release.tag_name }}
      INFRA_REPOSITORY: scidsg/hushline-infra
      INFRA_BASE_REF: main
      INFRA_BRANCH: ${{ github.event.release.tag_name }}
      INFRA_FILE: hushline-env/hushline.tf
      INFRA_PUSH_TOKEN: ${{ secrets.HUSHLINE_INFRA_STAGING_PAT || secrets.HUSHLINE_INFRA_TOKEN }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for release image to be available
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 40); do
            if docker buildx imagetools inspect "$IMAGE_REF" >/dev/null 2>&1; then
              echo "Release image is available: $IMAGE_REF"
              exit 0
            fi

            echo "Release image not available yet (attempt ${attempt}/40): $IMAGE_REF"
            sleep 30
          done

          echo "::error title=Release image not available::Timed out waiting for $IMAGE_REF"
          exit 1

      - name: Check out hushline-infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.INFRA_REPOSITORY }}
          ref: ${{ env.INFRA_BASE_REF }}
          token: ${{ env.INFRA_PUSH_TOKEN }}
          path: hushline-infra

      - name: Reset release branch to trusted infra base
        working-directory: hushline-infra
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads origin "$INFRA_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$INFRA_BRANCH":"refs/remotes/origin/$INFRA_BRANCH"
          fi

          git checkout -B "$INFRA_BRANCH" "origin/$INFRA_BASE_REF"

      - name: Update staging version branch reference
        id: update_infra
        working-directory: hushline-infra
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          infra_file = Path(os.environ["INFRA_FILE"])
          release_tag = os.environ["RELEASE_TAG"]
          original = infra_file.read_text(encoding="utf-8")

          updated, count = re.subn(
              r'(?m)^(\s*tag\s*=\s*")v\d+\.\d+\.\d+(")',
              rf'\g<1>{release_tag}\g<2>',
              original,
              count=1,
          )

          if count != 1:
              raise SystemExit(
                  f"Expected to replace exactly one staging tag in {infra_file}, replaced {count}.",
              )

          if updated != original:
              infra_file.write_text(updated, encoding="utf-8")
          PY

          if git diff --quiet -- "$INFRA_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Staging infra already points at $RELEASE_TAG"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit infra branch
        if: steps.update_infra.outputs.changed == 'true'
        working-directory: hushline-infra
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "hushline-dev"
          git config user.email "git-dev@scidsg.org"
          git add "$INFRA_FILE"
          if git diff --cached --quiet; then
            echo "Staging branch $INFRA_BRANCH is already up to date"
            exit 0
          fi
          git commit -m "Bump staging to $RELEASE_TAG"

      - name: Verify only the staging tag changed
        if: steps.update_infra.outputs.changed == 'true'
        working-directory: hushline-infra
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          import subprocess

          base_ref = os.environ["INFRA_BASE_REF"]
          infra_file = os.environ["INFRA_FILE"]
          release_tag = os.environ["RELEASE_TAG"]

          diff = subprocess.run(
              ["git", "diff", f"origin/{base_ref}...HEAD", "--", infra_file],
              check=True,
              stdout=subprocess.PIPE,
              text=True,
          ).stdout
          changed_files = subprocess.run(
              ["git", "diff", "--name-only", f"origin/{base_ref}...HEAD"],
              check=True,
              stdout=subprocess.PIPE,
              text=True,
          ).stdout.splitlines()

          tag_line_pattern = re.compile(r'^[+-]\s*tag\s*=\s*"v\d+\.\d+\.\d+"$')
          changed_lines = [
              line
              for line in diff.splitlines()
              if line.startswith(("+", "-")) and not line.startswith(("+++", "---"))
          ]
          tag_changes = [line for line in changed_lines if tag_line_pattern.match(line)]
          expected_added_tag = re.compile(
              rf'^\+\s*tag\s*=\s*"{re.escape(release_tag)}"$',
          )

          if (
              changed_files != [infra_file]
              or changed_lines != tag_changes
              or len(tag_changes) != 2
              or not tag_changes[0].startswith("-")
              or not expected_added_tag.match(tag_changes[1])
          ):
              raise SystemExit(
                  "Expected exactly one staging tag replacement in "
                  f"{infra_file}, got files {changed_files} "
                  f"and diff lines {changed_lines}.",
              )
          PY

      - name: Push infra branch
        if: steps.update_infra.outputs.changed == 'true'
        working-directory: hushline-infra
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${INFRA_PUSH_TOKEN:-}" ]; then
            echo "::error title=Missing infra push token::HUSHLINE_INFRA_STAGING_PAT and HUSHLINE_INFRA_TOKEN are both unset."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${INFRA_PUSH_TOKEN}@github.com/${INFRA_REPOSITORY}.git"
          git push --force-with-lease=refs/heads/"$INFRA_BRANCH" origin "$INFRA_BRANCH"

      - name: Create or update staging PR
        if: steps.update_infra.outputs.changed == 'true'
        id: create_or_update_pr
        working-directory: hushline-infra
        shell: bash
        env:
          GH_TOKEN: ${{ env.INFRA_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          infra_owner="${INFRA_REPOSITORY%%/*}"
          existing_pr_url="$(gh pr list \
            --repo "$INFRA_REPOSITORY" \
            --head "${infra_owner}:${INFRA_BRANCH}" \
            --base "$INFRA_BASE_REF" \
            --json url \
            --jq '.[0].url')"

          pr_title="Bump staging to $RELEASE_TAG"
          pr_body="$(cat <<EOF
          Automated from Hush Line release \`$RELEASE_TAG\`.

          This updates \`$INFRA_FILE\` to the released version branch so merging to \`$INFRA_BASE_REF\` deploys staging.
          EOF
          )"

          if [ -n "$existing_pr_url" ] && [ "$existing_pr_url" != "null" ]; then
            gh pr edit "$existing_pr_url" \
              --repo "$INFRA_REPOSITORY" \
              --title "$pr_title" \
              --body "$pr_body"
            echo "pr_url=$existing_pr_url" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_url="$(gh pr create \
            --repo "$INFRA_REPOSITORY" \
            --base "$INFRA_BASE_REF" \
            --head "${infra_owner}:${INFRA_BRANCH}" \
            --title "$pr_title" \
            --body "$pr_body")"

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Merge staging PR if immediately allowed
        if: steps.update_infra.outputs.changed == 'true'
        working-directory: hushline-infra
        shell: bash
        env:
          GH_TOKEN: ${{ env.INFRA_PUSH_TOKEN }}
          PR_URL: ${{ steps.create_or_update_pr.outputs.pr_url }}
        run: |
          set -euo pipefail

          merge_output_file="$(mktemp)"

          if gh pr merge \
            --repo "$INFRA_REPOSITORY" \
            --squash \
            --delete-branch \
            "$PR_URL" >"$merge_output_file" 2>&1; then
            cat "$merge_output_file"
            exit 0
          fi

          cat "$merge_output_file"

          if grep -Fq "base branch policy prohibits the merge" "$merge_output_file"; then
            echo "::notice title=Staging PR awaiting branch policy::Created $PR_URL but it is not immediately mergeable. Complete the required checks or review in $INFRA_REPOSITORY before merging."
            {
              echo "## Staging infra PR awaiting merge"
              echo
              echo "$PR_URL"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          exit 1
