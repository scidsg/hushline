name: SecureDrop Directory Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 1 1,4,7,10 *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: securedrop-directory-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Refresh SecureDrop directory listings
        run: |
          REFRESH_ARGS="--summary-output /tmp/securedrop-refresh.md"
          make refresh-securedrop-listings REFRESH_SECUREDROP_ARGS="$REFRESH_ARGS"

      - name: Read refresh summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail

          write_summary_output() {
            local payload_path="$1"
            local delimiter

            for _ in {1..10}; do
              delimiter="SECUREDROP_SUMMARY_$(uuidgen)"
              if ! grep -Fxq "$delimiter" "$payload_path"; then
                {
                  echo "body<<${delimiter}"
                  cat "$payload_path"
                  echo "${delimiter}"
                } >> "$GITHUB_OUTPUT"
                return 0
              fi
            done

            echo "Unable to find a safe GitHub output delimiter" >&2
            return 1
          }

          if [ -f /tmp/securedrop-refresh.md ]; then
            write_summary_output /tmp/securedrop-refresh.md
            exit 0
          fi

          fallback_summary="$(mktemp)"
          cat > "$fallback_summary" <<'SUMMARY'
          ## SecureDrop Directory Refresh Summary

          - Refresh completed.
          SUMMARY
          write_summary_output "$fallback_summary"

      - name: Create or update refresh PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.ADMIN_PAT }}
          branch: bot/securedrop-directory-refresh
          delete-branch: true
          commit-message: "Refresh SecureDrop directory listings"
          title: "Refresh SecureDrop directory listings"
          body: |
            Automated refresh of `hushline/data/securedrop_directory_instances.json`.

            ${{ steps.summary.outputs.body }}
          add-paths: |
            hushline/data/securedrop_directory_instances.json
