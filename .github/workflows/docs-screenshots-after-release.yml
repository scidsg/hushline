name: Run docs screenshots after release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to capture, for example v0.5.103."
        required: true
        default: ""

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: docs-screenshots-after-release-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  prepare-release:
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && startsWith(github.event.release.tag_name, 'v')) }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    env:
      MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
      EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${EVENT_RELEASE_TAG:-}"
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="${MANUAL_RELEASE_TAG:-}"
          fi

          RELEASE_TAG="$RELEASE_TAG" python -c 'import os, re, sys; release_tag = os.environ["RELEASE_TAG"].strip(); re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", release_tag) or sys.exit(f"Unexpected release tag: {release_tag!r}")'
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for release image to be available
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}/hushline:${{ steps.release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 40); do
            if docker buildx imagetools inspect "$IMAGE_REF" >/dev/null 2>&1; then
              echo "Release image is available: $IMAGE_REF"
              exit 0
            fi

            echo "Release image not available yet (attempt ${attempt}/40): $IMAGE_REF"
            sleep 30
          done

          echo "::error title=Release image not available::Timed out waiting for $IMAGE_REF"
          exit 1

  capture-docs-screenshots:
    needs: prepare-release
    uses: ./.github/workflows/docs-screenshots.yml
    with:
      release_key: ${{ needs.prepare-release.outputs.release_tag }}
      release_ref: ${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit

  publish-docs-screenshots:
    needs:
      - prepare-release
      - capture-docs-screenshots
    uses: ./.github/workflows/publish-docs-screenshots.yml
    with:
      source_run_id: ${{ github.run_id }}
    secrets: inherit
